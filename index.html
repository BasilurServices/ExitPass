<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/png" href="logo.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In | Basilur Management</title>
  <link rel="stylesheet" href="css/style.css?v=2.0">
  <style>
    .login-container {
      animation: fade-in 0.8s ease-out;
    }

    .login-form-card {
      animation: slide-up 0.6s cubic-bezier(0.16, 1, 0.3, 1);
    }
  </style>
</head>

<body>
  <div class="login-wrap">
    <div class="login-container">
      <div class="login-header" style="text-align: center;">
        <div class="topbar__logo-container" style="margin-bottom: 12px; margin-inline: auto;">
          <img src="logo.png" alt="Basilur Logo" class="topbar__logo-img logo-glow-pulse-active">
        </div>
        <div class="login-brand" style="text-align: center; width: 100%;">BASILUR EXIT PASS SYSTEM</div>
      </div>

      <div class="login-form-card">
        <div class="login-form-header">
          <div class="login-back-arrow">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
              stroke-linecap="round" stroke-linejoin="round">
              <path d="m15 18-6-6 6-6" />
            </svg>
          </div>
          <h2 class="login-title">WELCOME BACK!</h2>
          <p class="login-subtitle">Access the Basilur Exit Pass Management Portal. Please enter your credentials to
            manage digital gate passes and security clearances efficiently.</p>
        </div>

        <div id="error-alert" class="alert alert--error hidden">
          <span class="alert__icon">⚠</span>
          <span id="error-msg">Invalid employee number or user not found.</span>
        </div>

        <form id="login-form">
          <div class="form-group">
            <label class="form-label" for="user_id">Employee Number</label>
            <input type="text" id="user_id" class="form-input" placeholder="e.g. 273" autocomplete="username"
              required />
          </div>

          <div class="form-group hidden" id="name-group" style="display: none; margin-top: 10px;">
            <label class="form-label" for="user_name">Full Name</label>
            <input type="text" id="user_name" class="form-input" placeholder="e.g. Kasun Perera" />
          </div>

          <div class="form-group hidden" id="password-group" style="display: none; margin-top: 10px;">
            <label class="form-label" for="user_pass">Password</label>
            <div class="password-input-wrap">
              <input type="password" id="user_pass" class="form-input" placeholder="Enter password" />
              <button type="button" class="password-toggle">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                  stroke-linecap="round" stroke-linejoin="round">
                  <path
                    d="M2.062 12.348a1 1 0 0 1 0-.696 10.75 10.75 0 0 1 19.876 0 1 1 0 0 1 0 .696 10.75 10.75 0 0 1-19.876 0Z" />
                  <circle cx="12" cy="12" r="3" />
                </svg>
              </button>
            </div>
          </div>



          <button type="submit" class="btn btn--premium" id="login-btn">
            Login
          </button>
        </form>


      </div>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/api.js"></script>
  <script src="js/ui.js"></script>
  <script>
    // Redirect if already logged in
    const session = Auth.getSession();
    if (session) Auth.redirectByRole(session.role);

    // Pre-fill user ID from previous login cookie
    const prevUserId = Auth.getCookie("ep_previous_login");
    if (prevUserId) {
      document.getElementById("user_id").value = prevUserId;
    }

    // Password Toggle
    const passToggle = document.querySelector(".password-toggle");
    if (passToggle) {
      passToggle.addEventListener("click", () => {
        const passInput = document.getElementById("user_pass");
        const type = passInput.getAttribute("type") === "password" ? "text" : "password";
        passInput.setAttribute("type", type);

        // Update icon if needed (can be toggled in CSS or SVG change)
        passToggle.style.color = type === "text" ? "var(--premium-blue)" : "var(--text-muted)";
      });
    }

    // Back Arrow (Minimal functionality: reset form)
    const backArrow = document.querySelector(".login-back-arrow");
    if (backArrow) {
      backArrow.addEventListener("click", () => {
        location.reload(); // Simplest way to reset state
      });
    }

    let isRegistering = false;

    // Handle login form
    document.getElementById("login-form").addEventListener("submit", async (e) => {
      e.preventDefault();
      const rawUserId = document.getElementById("user_id").value;
      const userId = Auth.normalizeUserId(rawUserId);
      const userName = document.getElementById("user_name").value.trim();
      const userPassElement = document.getElementById("user_pass");
      const userPass = userPassElement ? userPassElement.value : "";
      const btn = document.getElementById("login-btn");
      const errDiv = document.getElementById("error-alert");
      const errMsg = document.getElementById("error-msg");
      const nameGroup = document.getElementById("name-group");
      const passGroup = document.getElementById("password-group");

      UI.hide(errDiv);
      UI.setButtonLoading(btn, true);

      try {
        if (isRegistering) {
          if (!userName) {
            errMsg.textContent = "Please enter your name.";
            UI.show(errDiv);
            UI.setButtonLoading(btn, false);
            return;
          }
          const res = await API.registerUser(userId, userName);
          if (res.success) {
            Auth.saveSession(res);
            UI.toast(`Welcome, ${res.name}!`, "success");
            setTimeout(() => Auth.redirectByRole(res.role), 500);
          } else {
            errMsg.textContent = res.error || "Registration failed.";
            UI.show(errDiv);
            UI.setButtonLoading(btn, false);
          }
        } else {
          // If password field is hidden, don't send any autofilled password yet.
          // This prevents "Incorrect password" errors from browser autofill 
          // before the password field is even shown.
          const passVisible = !passGroup.classList.contains("hidden");
          const res = await API.loginUser(userId, passVisible ? userPass : "");

          if (res.success) {
            Auth.saveSession(res);
            UI.toast(`Welcome back, ${res.name}!`, "success");
            setTimeout(() => Auth.redirectByRole(res.role), 500);
          } else {
            if (res.require_password) {
              passGroup.style.display = "block";
              passGroup.classList.remove("hidden");
              userPassElement.required = true;
              document.getElementById("user_id").readOnly = true;
              UI.setButtonLoading(btn, false, "Login with Password");
              userPassElement.focus();
            } else if (res.error && res.error.includes("User not found")) {
              isRegistering = true;
              nameGroup.style.display = "block";
              nameGroup.classList.remove("hidden");
              document.getElementById("user_name").required = true;
              UI.setButtonLoading(btn, false, "Register & Login");
              document.getElementById("user_name").focus();
            } else {
              errMsg.textContent = res.error || "Login fail";
              UI.show(errDiv);
              UI.setButtonLoading(btn, false);
            }
          }
        }
      } catch (err) {
        console.error("Login generic catch block intercepted an error:", err);
        errMsg.textContent = "Connection error. Please try again or check GAS access.";
        UI.show(errDiv);
        UI.setButtonLoading(btn, false);
      }
    });
  </script>
</body>

</html>
